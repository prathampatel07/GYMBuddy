# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — CI/CD Pipeline for GymBuddy
# Triggers: push/PR to main or develop
# Jobs: lint → unit tests → integration tests → build check → deploy
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'
  # Test uses mock DB — no real DB needed in CI
  MONGODB_URI: ''
  JWT_SECRET: ci_test_secret_not_for_production
  JWT_EXPIRY: 1d
  NODE_ENV: test

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Lint frontend (ESLint)
        run: npm run lint --prefix frontend
        continue-on-error: true   # Report but don't block on lint warnings

  # ── Job 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend

      - name: Run unit tests
        run: npm run test:unit --prefix backend
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/junit-results.xml
          if-no-files-found: ignore

  # ── Job 3: Integration Tests ────────────────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend

      - name: Run integration tests
        run: npm run test:integration --prefix backend
        env:
          NODE_OPTIONS: --experimental-vm-modules
          MONGODB_URI: ${{ env.MONGODB_URI }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          if-no-files-found: ignore

  # ── Job 4: Frontend Build Check ─────────────────────────────────────────────
  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_URL: https://gymbuddy-api.onrender.com/api
          VITE_APP_NAME: GymBuddy
          VITE_APP_ENV: production

      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sh frontend/dist | cut -f1)
          echo "📦 Bundle size: $BUILD_SIZE"
          echo "bundle-size=$BUILD_SIZE" >> $GITHUB_OUTPUT
        id: bundle

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Job 5: Deploy to Render (Backend) — main branch only ───────────────────
  deploy-backend:
    name: 🚀 Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://gymbuddy-api.onrender.com
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            | tee /tmp/render_response.json
          echo "✅ Render deploy triggered"

      - name: Wait for Render health check
        run: |
          echo "⏳ Waiting 60s for Render to spin up..."
          sleep 60
          MAX_RETRIES=10
          RETRY=0
          until curl -sf https://gymbuddy-api.onrender.com/api/health; do
            echo "Health check attempt $((++RETRY))/$MAX_RETRIES..."
            [ $RETRY -ge $MAX_RETRIES ] && echo "❌ Health check failed!" && exit 1
            sleep 15
          done
          echo "✅ Backend is healthy!"

  # ── Job 6: Deploy to Vercel (Frontend) — main branch only ──────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend-build, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://gymbuddy.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Job 7: Notify on Failure ────────────────────────────────────────────────
  notify-failure:
    name: 📢 Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, frontend-build]
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "❌ CI pipeline failed on branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Triggered by: ${{ github.event_name }}"
          # Add Slack/Discord webhook notification here if needed
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" -d '{"text":"CI Failed!"}'
