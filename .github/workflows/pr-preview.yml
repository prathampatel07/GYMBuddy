# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — Pull Request Preview Deployments
# Creates a Vercel preview URL for every PR so reviewers can test the UI
# ─────────────────────────────────────────────────────────────────────────────
name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20.x'

jobs:
  # Quick smoke test before preview
  test:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefix backend
      - run: npm run test:unit --prefix backend
        env:
          NODE_OPTIONS: --experimental-vm-modules
          JWT_SECRET: ci_preview_secret

  # Deploy preview
  preview:
    name: 🔍 Vercel Preview
    runs-on: ubuntu-latest
    needs: test
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "🔗 Preview: $PREVIEW_URL"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const body = [
              '## 🚀 Preview Deployment Ready',
              '',
              `**URL:** ${previewUrl}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Unit Tests | ✅ Passed |',
              '| Frontend Build | ✅ Success |',
              '| Preview Deploy | ✅ Live |',
              '',
              '*Preview will be automatically deleted when this PR is closed.*',
            ].join('\n');

            // Find existing bot comment to update
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
